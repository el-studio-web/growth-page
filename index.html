<body>
<div class="app">
  <h1>電商部門職等職級標準規範</h1>
  <p class="subtitle">官網企劃 · 電商企劃 · 營運　三組 × 三軌 × 17 職等　含薪資區間</p>
  <div class="top-row">
    <button class="team-btn web on" id="bWeb" onclick="setTeam('web')">官網企劃</button>
    <button class="team-btn ec" id="bEc" onclick="setTeam('ec')">電商企劃</button>

<script>
// ── 薪資帶 ──────────────────────────────────────────────────────────
const Rnd=n=>Math.round(n/500)*500;
function bld(mid,r){return{mid,min:Rnd(mid*(1-r)),max:Rnd(mid*(1+r*1.4))};}
const SAL={
  web:{
    E:[bld(32000,.063),bld(34000,.065),bld(37000,.068),bld(41000,.073),bld(46000,.080),bld(52000,.088),bld(58000,.095)],
    P:[bld(48000,.090),bld(58000,.100),bld(70000,.110),bld(85000,.125)],
    L:[bld(32500,.077),bld(55000,.090),bld(65000,.098),bld(75000,.107),bld(88000,.114),bld(110000,.125)]
  },
  ec:{
    E:[bld(32000,.063),bld(34000,.065),bld(37000,.068),bld(42000,.073),bld(48000,.080),bld(55000,.088),bld(62000,.095)],
    P:[bld(50000,.090),bld(61000,.100),bld(74000,.110),bld(90000,.125)],
    L:[bld(32500,.077),bld(58000,.090),bld(68000,.098),bld(79000,.107),bld(93000,.114),bld(115000,.125)]
  },
  ops:{
    E:[bld(30000,.063),bld(32000,.065),bld(35000,.068),bld(38000,.073),bld(43000,.080),bld(49000,.088),bld(55000,.095)],
    P:[bld(47000,.090),bld(58000,.100),bld(72000,.110),bld(88000,.125)],
    L:[bld(32500,.077),bld(50000,.090),bld(60000,.098),bld(71000,.107),bld(86000,.114),bld(110000,.125)]
  }
};
function K(n){return(n/1000).toFixed(1)+'K'}
function salHtml(team,track,idx){
  const s=SAL[team][track][idx];
  if(!s)return'';
  const w=SAL.web[track][idx],e=SAL.ec[track][idx];
  let diff='';
  if(team==='ec'&&s.mid!==w.mid){const d=s.mid-w.mid;diff=`<div class="sal-diff">較官網企劃同職等：${d>0?'+':''}${K(d)}</div>`;}
  if(team==='ops'){
    const dw=s.mid-w.mid,de=s.mid-e.mid;
    const p=[];
    if(dw!==0)p.push(`vs 官網 ${dw>=0?'+':''}${K(dw)}`);
    if(de!==0)p.push(`vs 電商 ${de>=0?'+':''}${K(de)}`);
    if(p.length)diff=`<div class="sal-diff">${p.join('　·　')}</div>`;
  }
  return`<div class="sal-block">
<div class="sal-title"><span class="dot" style="background:#B45309"></span>薪資區間（月薪，稅前）</div>
<div class="sal-grid">
  <div class="sal-cell"><div class="sal-label">Min</div><div class="sal-val">${K(s.min)}</div><div class="sal-unit">NT$/月</div></div>
  <div class="sal-cell mid-cell"><div class="sal-label">Mid（市場目標）</div><div class="sal-val" style="color:#185FA5">${K(s.mid)}</div><div class="sal-unit">NT$/月</div></div>
  <div class="sal-cell"><div class="sal-label">Max</div><div class="sal-val">${K(s.max)}</div><div class="sal-unit">NT$/月</div></div>
</div>
<div class="sal-yr">
  <span>保障年薪 ×14：<strong>${(s.mid*14/10000).toFixed(1)} 萬</strong></span>
  <span>績效年薪 ×16：<strong style="color:#085041">${(s.mid*16/10000).toFixed(1)} 萬</strong></span>
</div>${diff}</div>`;
}

// ── 官網企劃 ─────────────────────────────────────────────────────────
const webFunnelMap={E0:['b'],E1:['b','p'],E2:['b','p','t'],E3:['b','p','t','a'],E4:['b','p','t','a','c'],E5:['b','p','t','a','c'],E6:['b','p','t','a','c'],P1:['p','t','a'],P2:['p','t','a','c'],P3:['b','p','t','a','c'],P4:['b','p','t','a','c'],L0:['b','p','t','a','c'],L1:['b','p','t','a'],L2:['b','p','t','a','c'],L3:['b','p','t','a','c'],L4:['b','p','t','a','c'],L5:['b','p','t','a','c']};
const funnelLabel={b:'意圖識別',p:'上層承接',t:'案型設計',a:'轉換節點',c:'會員經營'};
const funnelCss={b:'pt-tw',p:'pt-hk',t:'pt-all',a:'pt-web',c:'pt-sea'};
function webTags(code){return(webFunnelMap[code]||[]).map(f=>`<span class="ptag ${funnelCss[f]}">${funnelLabel[f]}</span>`).join('');}

const WEB={
E:[
{code:'E0',en:'Assistant Specialist',zh:'助理專員',

scope:'對內：全程督導下工作　·　對外：不對外代表部門　·　負責結果：頁面上架的準確性與時效',
skills:['依照模板在CMS後台完成商品頁、活動頁內容上架','確認頁面上線前的基本資料正確性（價格、圖片、連結、文案）','協助整理GA4基礎報表數據（頁面瀏覽量、跳出率）'],
ksao:{k:['網站基本結構：首頁、分類頁、商品頁、活動頁的功能差異','基本電商術語：CVR、跳出率、PV、UV、加購率','CMS後台基礎操作'],s:['依規範完成頁面內容輸入，不漏欄位','使用GA4查看指定頁面基礎瀏覽數據','依SOP執行標準化作業'],a:['閱讀頁面時能感知「這個設計在引導客人做什麼」','發現頁面資料異常時主動確認'],o:['對細節有執著，資料輸入不容許錯誤','對頁面設計有自發性好奇心']},

kpis:['頁面上架準時率','頁面資料錯誤率（目標：零錯誤）'],
promo:'能獨立完成標準頁面建置，並開始說出「這個頁面設計可以如何改善使用者體驗」'},
{code:'E1',en:'Specialist',zh:'專員',

scope:'對內：獨立負責1–2項業務項目，定期回報　·　對外：與設計、開發有基本需求溝通　·　負責結果：頁面準時交付與基本轉換品質',

ksao:{k:['轉換漏斗上層邏輯：客人從哪來、進哪個頁面、第一眼看什麼','UTM參數結構與流量分析基礎','基礎UX概念：F型閱讀、視線引導、CTA設計原則'],s:['用GA4分析頁面跳出率、停留時間、點擊熱區','撰寫具備引導邏輯的活動頁文案','向設計同仁提出有邏輯的頁面修改需求'],a:['用客人視角審視頁面：進來後知道要做什麼嗎？','區分頁面設計問題與流量來源問題'],o:['對文字與視覺有基本美感','主動在頁面上線後查看數據']},

const CONTENT={web:WEB, ec:EC, ops:OPS};
const TM={E:{label:'基本軌',cls:'aE',badge:'bE'},P:{label:'專業軌',cls:'aP',badge:'bP'},L:{label:'管理軌',cls:'aL',badge:'bL'}};
const TRACK_IDX={E:0,P:1,L:2};
let team='web', ct='E', ci=0;

function setTeam(t){
  team=t;ct='E';ci=0;
  ['web','ec','ops'].forEach(k=>{
    document.getElementById('b'+k.charAt(0).toUpperCase()+k.slice(1)).className='team-btn '+k+(k===t?' on':'');
  });
  renderTracks();renderGrades();renderCard();
}
function st(t){ct=t;ci=0;renderTracks();renderGrades();renderCard();}
function sg(i){ci=i;renderGrades();renderCard();}

function renderTracks(){
  document.getElementById('tr').innerHTML=Object.keys(TM).map(k=>
    `<button class="t-btn ${TM[k].cls}${ct===k?' on':''}" onclick="st('${k}')">${TM[k].label}</button>`
  ).join('');
}
function renderGrades(){
  document.getElementById('gr').innerHTML=CONTENT[team][ct].map((g,i)=>
    `<button class="g-btn ${TM[ct].cls}${ci===i?' on':''}" onclick="sg(${i})">${g.code}</button>`
  ).join('');
}

function getTags(code){
  if(team==='web'){
    return(webFunnelMap[code]||[]).map(f=>`<span class="ptag ${funnelCss[f]}">${funnelLabel[f]}</span>`).join('');
  }else if(team==='ec'){
    return(ecPlatMap[code]||[]).map(p=>`<span class="ptag ${p.c}">${p.l}</span>`).join('');
  }else{
    return(opsPlatMap[code]||[]).map(p=>`<span class="ptag ${p.c}">${p.l}</span>`).join('');
  }
}
function getTeamTagHtml(){
  const map={web:['tag-web','官網企劃'],ec:['tag-ec','電商企劃'],ops:['tag-ops','營運']};
  return`<span class="team-tag ${map[team][0]}">${map[team][1]}</span>`;
}
function getTeamLabel(){return{web:'官網企劃',ec:'電商企劃',ops:'營運'}[team];}

function listHtml(arr){return arr.map(x=>`<li>${x}</li>`).join('');}

  const sal=salHtml(team,ct,idx);
  document.getElementById('ca').innerHTML=`
<div class="card">

    <div style="flex:1">
      <div class="h-en">${g.en} <span style="font-weight:400;color:#888">／ ${g.zh}</span></div>
      <div class="h-zh">${TM[ct].label}</div>
    </div>
    ${getTeamTagHtml()}
  </div>
  <div class="sec">
    <div class="sl"><span class="dot" style="background:#7F77DD"></span>角色定位</div>
    <div class="sb">${g.summary}</div>
    <div style="margin-top:9px">${tagHtml}</div>
  </div>
  <div class="sec">
    <div class="sl"><span class="dot" style="background:#1D9E75"></span>影響範圍與責任</div>
    <div class="sb">${g.scope}</div>
  </div>
  <div class="divider-label">▸ ${getTeamLabel()} 小組專屬內容</div>
  <div class="sec">
    <div class="sl"><span class="dot" style="background:#534AB7"></span>關鍵差異化技能</div>
    <ul class="items">${listHtml(g.skills)}</ul>
  </div>
  <div class="sec">
    <div class="sl"><span class="dot" style="background:#378ADD"></span>KSAO 專業職能</div>
    <div class="ksao-grid">

  </div>
  ${sal}
</div>`;
}

// init
renderTracks();renderGrades();renderCard();
